name: NouraBinSaidanArtStudio
options:
  bundleIdPrefix: com.nourabinsaidan
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: ar

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: YES

targets:
  NouraBinSaidanArtStudio:
    type: application
    platform: iOS
    sources:
      - path: NouraBinSaidanArtStudio
        excludes:
          - "Info.plist"
    resources:
      - NouraBinSaidanArtStudio/Resources
      - NouraBinSaidanArtStudio/Data
    info:
      path: NouraBinSaidanArtStudio/Info.plist
      properties:
        CFBundleDisplayName: Noura Bin Saidan
        CFBundleDevelopmentRegion: ar
        CFBundleLocalizations:
          - ar
          - en
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nourabinsaidan.studio
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
